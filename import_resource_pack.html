<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>五域两天 · 蛊虫资源包导入器 修复版</title>
<style>
body{margin:0;background:#24180f;color:#1a120b;font-family:"Songti SC","Noto Serif SC",serif}.box{max-width:1050px;margin:28px auto;background:#fff4d8;border:2px solid #bd8b2a;border-radius:22px;padding:28px;box-shadow:0 20px 80px #0008}h1{font-size:34px}.pill{display:inline-block;background:#ead7a7;border-radius:999px;padding:7px 13px;margin:4px}button{border:1px solid #b88729;border-radius:12px;background:#ffe7a6;padding:13px 18px;font-weight:900;margin:8px;cursor:pointer;font-size:16px}button.danger{background:#9b1d1d;color:white;border-color:#9b1d1d}#log{white-space:pre-wrap;background:#120d08;color:#fff7d5;border-radius:14px;padding:15px;min-height:260px;margin-top:14px;overflow:auto}.warn{color:#7d1a1a;font-weight:700}</style>
</head>
<body>
<div class="box">
<h1>五域两天 · 资源导入器 V8.1 修复版</h1>
<p>会读取 <b>guworms.json</b>、<b>materials.json</b>、<b>recipes.json</b>。如果这三个不存在，会尝试读取 <b>gu_resource_pack_v1.json</b>。</p>
<p class="warn">只在你的 GitHub Pages 网站打开，不要用 file:// 本地打开。</p>
<div><span class="pill">蛊虫</span><span class="pill">蛊材</span><span class="pill">蛊方</span></div>
<button id="testBtn">测试连接/读取资源</button>
<button id="allBtn">一键导入全部</button>
<button id="guBtn">只导入蛊虫</button>
<button id="matBtn">只导入蛊材</button>
<button id="recBtn">只导入蛊方</button>
<button id="clearBtn" class="danger">清空日志</button>
<div id="log">等待导入……</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBn_b3C0EEt5ETRMQXVCjaxFf9SRgOiBKg",
  authDomain: "gu-world.firebaseapp.com",
  projectId: "gu-world",
  storageBucket: "gu-world.firebasestorage.app",
  messagingSenderId: "520066392434",
  appId: "1:520066392434:web:8b6203c35f57dd143bfdeb",
  measurementId: "G-RG829DQ72Z"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const logEl = document.getElementById('log');
function log(s){ logEl.textContent += '\n' + s; logEl.scrollTop = logEl.scrollHeight; }
function idOf(x, prefix){ return (x.id || x.name || (prefix+'_'+Math.random().toString(36).slice(2))).toString().replace(/[\\/#\[\].]/g,'_'); }
async function fetchJson(path){
  const url = './' + path + '?v=' + Date.now();
  const r = await fetch(url);
  if(!r.ok) throw new Error(path + ' 读取失败：HTTP ' + r.status);
  return await r.json();
}
async function loadPack(){
  try{
    const [guworms, materials, recipes] = await Promise.all([fetchJson('guworms.json'), fetchJson('materials.json'), fetchJson('recipes.json')]);
    return {guworms, materials, recipes};
  }catch(e){
    log('分文件读取失败，尝试读取 gu_resource_pack_v1.json：' + e.message);
    const pack = await fetchJson('gu_resource_pack_v1.json');
    return {guworms: pack.guworms || pack.gu || [], materials: pack.materials || [], recipes: pack.recipes || []};
  }
}
async function importList(collectionName, list, prefix){
  if(!Array.isArray(list)) throw new Error(collectionName + ' 不是数组');
  log('开始导入 ' + collectionName + '：' + list.length + ' 条');
  let i=0;
  for(const item of list){
    const id = idOf(item,prefix);
    await setDoc(doc(db, collectionName, id), {...item, id, status:item.status || 'approved', updatedAt: serverTimestamp()}, {merge:true});
    i++;
    if(i%10===0) log(collectionName + ' 已导入 ' + i + '/' + list.length);
  }
  log('完成 ' + collectionName + '：' + i + ' 条');
}
async function test(){
  logEl.textContent = '开始测试……';
  const pack = await loadPack();
  log('资源读取成功：蛊虫 ' + pack.guworms.length + '，蛊材 ' + pack.materials.length + '，蛊方 ' + pack.recipes.length);
  log('Firebase 项目：' + firebaseConfig.projectId);
  log('测试完成，可以点“一键导入全部”。');
}
async function run(kind){
  try{
    logEl.textContent = '开始导入……';
    const pack = await loadPack();
    if(kind==='all'||kind==='gu') await importList('guworms', pack.guworms, 'gu');
    if(kind==='all'||kind==='mat') await importList('materials', pack.materials, 'mat');
    if(kind==='all'||kind==='rec') await importList('recipes', pack.recipes, 'rec');
    log('全部完成。回主站强制刷新即可查看。');
  }catch(e){
    console.error(e);
    log('❌ 出错：' + (e.message || e));
    log('请按 F12 → Console，把红色报错截图发给我。');
  }
}
document.getElementById('testBtn').onclick = () => test().catch(e=>{console.error(e); log('❌ 测试失败：'+e.message);});
document.getElementById('allBtn').onclick = () => run('all');
document.getElementById('guBtn').onclick = () => run('gu');
document.getElementById('matBtn').onclick = () => run('mat');
document.getElementById('recBtn').onclick = () => run('rec');
document.getElementById('clearBtn').onclick = () => {logEl.textContent='等待导入……'};
</script>
</body>
</html>
